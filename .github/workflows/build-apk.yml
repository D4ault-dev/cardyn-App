name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_API_URL: https://api.cardyn.net
          EXPO_PUBLIC_ENV: production

      - name: Rename APK with version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/cardyn-v${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardyn-android-apk
          path: android/app/build/outputs/apk/release/cardyn-*.apk
          retention-days: 30

      # Auto-create GitHub Release on every push to main
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "Cardyn Android — Latest Build"
          body: |
            **Auto-built from commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Install
            1. Download `cardyn-v${{ steps.version.outputs.version }}.apk`
            2. On your Android phone: Settings → Install unknown apps → Allow
            3. Open the downloaded APK and install

            > This is always the latest build. Previous builds are in the [Actions artifacts](https://github.com/${{ github.repository }}/actions).
          files: android/app/build/outputs/apk/release/cardyn-*.apk
          prerelease: false
        permissions:
          contents: write
