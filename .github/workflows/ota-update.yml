name: OTA Update (Expo)

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'app.json'
      - 'package.json'
  workflow_dispatch:

jobs:
  ota-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update (production channel)
        run: eas update --branch production --message "Auto update from commit ${{ github.sha }}"
        env:
          EXPO_PUBLIC_API_URL: https://api.cardyn.net
          EXPO_PUBLIC_ENV: production
