name: OTA Update (Expo EAS)

# Pushes a JS/asset update to production users silently.
# Users get it on next app open — no APK download needed.
# Only triggers when JS/asset files change (not native code).

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'App.tsx'
      - 'app.json'
      - 'package.json'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message shown in Expo dashboard'
        required: false
        default: 'Auto update from GitHub Actions'

jobs:
  ota-update:
    name: Publish OTA Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production
        run: |
          eas update \
            --branch production \
            --message "${{ github.event.inputs.message || github.event.head_commit.message }}" \
            --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://api.cardyn.net
          EXPO_PUBLIC_ENV: production

      - name: Summary
        run: |
          echo "## ✅ OTA Update Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Message:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users will receive this update silently on next app open." >> $GITHUB_STEP_SUMMARY
